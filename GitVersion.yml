workflow: GitHubFlow/v1
mode: ContinuousDeployment
tag-prefix: ''
increment: Inherit

branches:
  main:
    regex: ^main$
    label: ''
    increment: Patch
    is-main-branch: true
    prevent-increment:
      when-current-commit-tagged: true

  release:
    regex: ^release[/-]
    label: ''
    increment: Patch
    is-release-branch: true
    prevent-increment:
      when-current-commit-tagged: true

  feature:
    regex: ^(?:feature|features|bugfix|fix)[/-](?:ext\w+[/-])?(?<BranchName>.+)
    label: '{BranchName}'
    increment: Inherit
